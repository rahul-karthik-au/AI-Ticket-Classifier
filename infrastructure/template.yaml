AWSTemplateFormatVersion: '2010-09-09'
Description: 'AI Ticket Classifier - Base Infrastructure (Learning)'

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues:
      - dev
      - prod
    Description: Deployment environment name

Resources:

  TicketClassificationsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub 'ticket-classifications-${Environment}'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: ticket_id
          AttributeType: S
        - AttributeName: classification_id
          AttributeType: S
        - AttributeName: team
          AttributeType: S
        - AttributeName: created_at
          AttributeType: S
        - AttributeName: ai_action
          AttributeType: S
      KeySchema:
        - AttributeName: ticket_id
          KeyType: HASH
        - AttributeName: classification_id
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: TeamCreatedIndex
          KeySchema:
            - AttributeName: team
              KeyType: HASH
            - AttributeName: created_at
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: ActionCreatedIndex
          KeySchema:
            - AttributeName: ai_action
              KeyType: HASH
            - AttributeName: created_at
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      TimeToLiveSpecification:
        AttributeName: TTL
        Enabled: true
      Tags:
        - Key: Project
          Value: ticket-classifier
        - Key: Environment
          Value: !Ref Environment

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'ticket-classifier-lambda-role-${Environment}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: TicketClassifierLambdaPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:PutItem
                  - dynamodb:GetItem
                  - dynamodb:Query
                  - dynamodb:UpdateItem
                  - dynamodb:Scan
                Resource:
                  - !GetAtt TicketClassificationsTable.Arn
                  - !Sub '${TicketClassificationsTable.Arn}/index/*'
              - Effect: Allow
                Action:
                  - ssm:GetParameter
                  - ssm:GetParameters
                  - ssm:GetParametersByPath
                Resource:
                  - !Sub 'arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/ticket-classifier/*'
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: '*'
              - Effect: Allow
                Action:
                  - cloudwatch:PutMetricData
                Resource: '*'


  ClassifierLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub 'ticket-classifier-${Environment}'
      Runtime: python3.12
      Handler: index.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 30
      MemorySize: 512
      Environment:
        Variables:
          ENVIRONMENT: !Ref Environment
          DYNAMODB_TABLE: !Sub 'ticket-classifications-${Environment}'
      Code:
        ZipFile: |
          import json

          def lambda_handler(event, context):
              path = event.get('path', '')
              if path == '/health':
                  return {
                      'statusCode': 200,
                      'headers': {'Content-Type': 'application/json'},
                      'body': json.dumps({'status': 'healthy', 'service': 'ticket-classifier'})
                  }
              return {
                  'statusCode': 200,
                  'headers': {'Content-Type': 'application/json'},
                  'body': json.dumps({
                      'message': 'Classification endpoint ready',
                      'note': 'Real logic added in Week 2'
                  })
              }
      Tags:
        - Key: Project
          Value: ticket-classifier
        - Key: Environment
          Value: !Ref Environment

  LambdaLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/lambda/ticket-classifier-${Environment}'
      RetentionInDays: 7

  TicketClassifierApi:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: !Sub 'ticket-classifier-api-${Environment}'
      Description: AI Ticket Classifier REST API
      EndpointConfiguration:
        Types:
          - REGIONAL

  V1Resource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref TicketClassifierApi
      ParentId: !GetAtt TicketClassifierApi.RootResourceId
      PathPart: v1

  ClassifyResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref TicketClassifierApi
      ParentId: !Ref V1Resource
      PathPart: classify

  HealthResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref TicketClassifierApi
      ParentId: !GetAtt TicketClassifierApi.RootResourceId
      PathPart: health

  ClassifyPostMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref TicketClassifierApi
      ResourceId: !Ref ClassifyResource
      HttpMethod: POST
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${ClassifierLambda.Arn}/invocations'

  HealthGetMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref TicketClassifierApi
      ResourceId: !Ref HealthResource
      HttpMethod: GET
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${ClassifierLambda.Arn}/invocations'

  ApiDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn:
      - ClassifyPostMethod
      - HealthGetMethod
    Properties:
      RestApiId: !Ref TicketClassifierApi

  ApiStage:
    Type: AWS::ApiGateway::Stage
    Properties:
      RestApiId: !Ref TicketClassifierApi
      DeploymentId: !Ref ApiDeployment
      StageName: !Ref Environment

  LambdaApiGatewayPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref ClassifierLambda
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${TicketClassifierApi}/*/*'

Outputs:

  ApiEndpoint:
    Description: API Gateway base URL
    Value: !Sub 'https://${TicketClassifierApi}.execute-api.${AWS::Region}.amazonaws.com/${Environment}'
    Export:
      Name: !Sub 'TicketClassifierApiEndpoint-${Environment}'

  LambdaFunctionName:
    Description: Lambda function name
    Value: !Ref ClassifierLambda

  DynamoDBTableName:
    Description: DynamoDB table name
    Value: !Ref TicketClassificationsTable
