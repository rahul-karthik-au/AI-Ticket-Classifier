name: Test and Deploy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:

  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt --quiet

      - name: Run tests
        run: |
          cd backend
          python -m pytest tests/ -v

  validate-infrastructure:
    name: Validate CloudFormation template
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Validate CloudFormation template
        run: |
          aws cloudformation validate-template \
            --template-body file://infrastructure/template.yaml
          echo "CloudFormation template is valid"

  deploy:
    name: Deploy to AWS
    runs-on: ubuntu-latest
    needs:
      - test
      - validate-infrastructure
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy CloudFormation stack
        run: |
          aws cloudformation deploy \
            --template-file infrastructure/template.yaml \
            --stack-name ${{ secrets.STACK_NAME }} \
            --parameter-overrides Environment=dev \
            --capabilities CAPABILITY_NAMED_IAM \
            --region ${{ secrets.AWS_REGION }}

      - name: Get API endpoint
        id: get-endpoint
        run: |
          ENDPOINT=$(aws cloudformation describe-stacks \
            --stack-name ${{ secrets.STACK_NAME }} \
            --query "Stacks[0].Outputs[?OutputKey=='ApiEndpoint'].OutputValue" \
            --output text)
          echo "endpoint=$ENDPOINT" >> $GITHUB_OUTPUT
          echo "API endpoint: $ENDPOINT"

      - name: Smoke test health check
        run: |
          ENDPOINT=${{ steps.get-endpoint.outputs.endpoint }}
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$ENDPOINT/health")
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "FAILED: /health returned $HTTP_STATUS"
            exit 1
          fi
          echo "PASSED: /health returned 200"

      - name: Package and deploy Lambda function
        run: |
          cd backend/src
          zip function.zip handler.py
          aws lambda update-function-code \
            --function-name ticket-classifier-dev \
            --zip-file fileb://function.zip \
            --region ${{ secrets.AWS_REGION }}
          aws lambda update-function-configuration \
            --function-name ticket-classifier-dev \
            --handler handler.lambda_handler \
            --region ${{ secrets.AWS_REGION }}
          echo "Lambda deployed"